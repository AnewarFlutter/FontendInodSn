# --------------------------------------------------------------
# logout - POST
# --------------------------------------------------------------

$name: logout
$description: "Déconnexion et révocation des tokens. Option pour révoquer toutes les sessions actives."
$skip: true
$async: true

$params:
  - $name: refresh_token
    $type: string
    $optional: false
  - $name: logout_all
    $type: boolean
    $optional: true

$returnDescription: "Confirmation de déconnexion"
$returnType:
  $type: string
  $nullable: true

$rewriteInController: true
$rewriteInDataSourceImpl: true
$implementationInDataSource:
  $type: api
  $client: fetch
  $endpoint: AUTH.LOGOUT
  $mapping:
    $body:
      refresh_token: refresh_token
      logout_all: logout_all
  $responseMapping:
    $returnValue: message
