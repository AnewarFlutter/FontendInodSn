# --------------------------------------------------------------
# AddItemOptionGroup - POST
# --------------------------------------------------------------
$name: addItemOptionGroup
$description: "Ajoute un groupe d'options à un item"
$skip: false
$async: true

$params:
  - $name: itemId
    $type: string
    $optional: false
  - $name: payload
    $type: AddItemOptionGroupPayload
    $optional: false
    $related: "--module config --feature item_management --kind custom --step feature"

$returnDescription: "Résultat de l'ajout du groupe d'options"
$returnType:
  $type: object
  $nullable: true

$rewriteInController: true
$rewriteInDataSourceImpl: true
$rewriteInDataSource: true
$rewriteInRepository: true
$implementationInDataSource:
  $type: api
  $client: fetch
  $endpoint: CONFIG.ADD_ITEM_OPTION_GROUP
  $mapping:
    $path:
      item_id: itemId
    $body:
      group_option_id: payload.group_option_id
      is_mandatory: payload.is_mandatory
      selection_type: payload.selection_type
      max_selections: payload.max_selections
  $responseMapping:
    $returnValue: ""

$imports:
  - $name: AddItemOptionGroupPayload
    $from: "--module config --feature item_management --kind custom --step feature"
    $step: feature
