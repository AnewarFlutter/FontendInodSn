      option_group_id: optionGroupId
    $body:
      payload: payload
  $responseMapping:
    $returnValue: ""

$imports:
  - $name: CreateOptionGroupPayload
    $from: "--module config --feature option_group_management --kind custom --step feature"
    $step: feature
  - $name: OptionGroupBasic
    $from: "--module config --kind custom --step module"
    $step: module
