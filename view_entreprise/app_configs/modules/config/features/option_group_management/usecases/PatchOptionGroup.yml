$name: patchOptionGroup
$description: "Met à jour partiellement un groupe d'options"
$skip: false
$async: true

$params:
  - $name: optionGroupId
    $type: string
    $optional: false
  - $name: payload
    $type: CreateOptionGroupPayload
    $optional: false
    $related: "--module config --feature option_group_management --kind custom --step feature"

$returnDescription: "Le groupe d'options patché"
$returnType:
  $type: OptionGroupBasic
  $nullable: true
  $related:
    - $name: OptionGroupBasic
      $module: config
      $kind: custom
      $step: module

$rewriteInController: true
$rewriteInDataSourceImpl: true
$rewriteInDataSource: true
$rewriteInRepository: true
$implementationInDataSource:
