# --------------------------------------------------------------
# DeleteTable - DELETE
# --------------------------------------------------------------
$name: deleteTable
$description: "Supprime une table par son identifiant"
$skip: false
$async: true

$params:
  - $name: tableId
    $type: string
    $optional: false

$returnDescription: "Confirmation de suppression"
$returnType:
  $type: object
  $nullable: true

$rewriteInController: true
$rewriteInDataSourceImpl: false
$rewriteInDataSource: true
$rewriteInRepository: true
$implementationInDataSource:
  $type: api
  $client: fetch
  $endpoint: CONFIG.DELETE_TABLE
  $mapping:
    $path:
      table_id: tableId
  $responseMapping:
    $returnValue: ""
