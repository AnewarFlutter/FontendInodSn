$name: deleteOption
$description: "Supprime une option par son identifiant"
$skip: false
$async: true

$params:
  - $name: optionId
    $type: string
    $optional: false

$returnDescription: "Confirmation de suppression"
$returnType:
  $type: object
  $nullable: true

$rewriteInController: true
$rewriteInDataSourceImpl: true
$rewriteInDataSource: true
$rewriteInRepository: true
$implementationInDataSource:
  $type: api
  $client: fetch
  $endpoint: CONFIG.DELETE_OPTION
  $mapping:
    $path:
      option_id: optionId
  $responseMapping:
    $returnValue: ""
