# --------------------------------------------------------------
# PatchDynamicConfig - PATCH
# --------------------------------------------------------------
$name: patchDynamicConfig
$description: "Met à jour partiellement une configuration dynamique (valeur, description)"
$skip: false
$async: true

$params:
  - $name: configId
    $type: string
    $optional: false
  - $name: value
    $type: string
    $optional: true
  - $name: description
    $type: string
    $optional: true

$returnDescription: "La configuration dynamique patchée"
$returnType:
  $type: DynamicConfigBasic
  $nullable: true
  $related:
    - $name: DynamicConfigBasic
      $module: config
      $kind: custom
      $step: module

$rewriteInController: true
$rewriteInDataSourceImpl: true
$rewriteInDataSource: true
$rewriteInRepository: true
$implementationInDataSource:
  $type: api
  $client: fetch
  $endpoint: CONFIG.PATCH_DYNAMIC_CONFIG
  $mapping:
    $path:
      config_id: configId
    $body:
      value: value
      description: description
  $responseMapping:
    $returnValue: ""

$imports:
  - $name: DynamicConfigBasic
    $from: "--module config --kind custom --step module"
    $step: module
