# --------------------------------------------------------------
# ActivateKitchen - POST
# --------------------------------------------------------------
$name: activateKitchen
$description: "Active une cuisine par son identifiant"
$skip: false
$async: true

$params:
  - { $name: kitchenId, $type: string, $optional: false }

$returnDescription: "La cuisine activée"
$returnType:
  $type: KitchenBasic
  $nullable: true
  $related:
    - $name: KitchenBasic
      $module: config
      $kind: custom
      $step: module

$rewriteInController: true
$rewriteInDataSourceImpl: true
$implementationInDataSource:
  $type: api
  $client: fetch
  $endpoint: CONFIG.ACTIVATE_KITCHEN
  $mapping:
    $path:
      kitchen_id: kitchenId
  $responseMapping:
    $returnValue: data

$imports:
  - $name: KitchenBasic
    $from: "--module config --kind custom --step module"
    $step: module
