# --------------------------------------------------------------
# GetAreaDetail - GET
# --------------------------------------------------------------
$name: getAreaDetail
$description: "Récupère le détail d'une zone par son identifiant"
$skip: false
$async: true

$params:
  - $name: areaId
    $type: string
    $optional: false

$returnDescription: "Le détail de la zone"
$returnType:
  $type: AreaBasic
  $nullable: true
  $related:
    - $name: AreaBasic
      $module: config
      $kind: custom
      $step: module

$rewriteInController: true
$rewriteInDataSourceImpl: true
$rewriteInDataSource: true
$rewriteInRepository: true
$implementationInDataSource:
  $type: api
  $client: fetch
  $endpoint: CONFIG.GET_AREA_DETAIL
  $mapping:
    $path:
      area_id: areaId
  $responseMapping:
    $returnValue: ""

$imports:
  - $name: AreaBasic
    $from: "--module config --kind custom --step module"
    $step: module
