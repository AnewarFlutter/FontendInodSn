# --------------------------------------------------------------
# GetAreasList - GET
# --------------------------------------------------------------
$name: getAreasList
$description: "Liste toutes les zones avec pagination et filtres"
$skip: false
$async: true

$params:
  - $name: area_type
    $type: string
    $optional: true
  - $name: is_active
    $type: boolean
    $optional: true
  - $name: has_items
    $type: boolean
    $optional: true
  - $name: search
    $type: string
    $optional: true
  - $name: ordering
    $type: string
    $optional: true

$returnDescription: "Liste paginée des zones"
$returnType:
  $type: PaginatedAreas
  $nullable: true
  $related:
    - $name: PaginatedAreas
      $module: config
      $kind: custom
      $step: module

$rewriteInController: true
$rewriteInDataSourceImpl: true
$rewriteInDataSource: true
$rewriteInRepository: true
$implementationInDataSource:
  $type: api
  $client: fetch
  $endpoint: CONFIG.GET_AREAS_LIST
  $mapping:
    $query:
      area_type: area_type
      is_active: is_active
      has_items: has_items
      search: search
      ordering: ordering
  $responseMapping:
    $returnValue: ""

$imports:
  - $name: PaginatedAreas
    $from: "--module config --kind custom --step module"
    $step: module
