# --------------------------------------------------------------
# CreateArea - POST
# --------------------------------------------------------------
$name: createArea
$description: "Crée une nouvelle zone"
$skip: false
$async: true

$params:
  - $name: payload
    $type: CreateAreaPayload
    $optional: false
    $related: "--module config --feature area_management --kind custom --step feature"

$returnDescription: "La zone créée"
$returnType:
  $type: AreaBasic
  $nullable: true
  $related:
    - $name: AreaBasic
      $module: config
      $kind: custom
      $step: module

$rewriteInController: true
$rewriteInDataSourceImpl: true
$rewriteInDataSource: true
$rewriteInRepository: true
$implementationInDataSource:
  $type: api
  $client: fetch
  $endpoint: CONFIG.CREATE_AREA
  $mapping:
    $body:
      payload: payload
  $responseMapping:
    $returnValue: ""

$imports:
  - $name: CreateAreaPayload
    $from: "--module config --feature area_management --kind custom --step feature"
    $step: feature
  - $name: AreaBasic
    $from: "--module config --kind custom --step module"
    $step: module
