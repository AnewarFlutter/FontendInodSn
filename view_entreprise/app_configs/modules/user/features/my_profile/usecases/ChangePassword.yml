# --------------------------------------------------------------
# changePassword - POST
# --------------------------------------------------------------
$name: changePassword
$description: "Changer le mot de passe de l'utilisateur connecté via l'endpoint /auth/change-password/."
$skip: true
$async: true

$params:
  - $name: old_password
    $type: string
    $optional: false
    $description: "Ancien mot de passe de l'utilisateur"
  - $name: new_password
    $type: string
    $optional: false
    $description: "Nouveau mot de passe souhaité (min. 8 caractères)"

$returnDescription: "Message de confirmation du changement de mot de passe"
$returnType:
  $type: string
  $nullable: true

$rewriteInController: true
$rewriteInDataSourceImpl: true
$implementationInDataSource:
  $type: api
  $client: fetch
  $endpoint: AUTH.CHANGE_PASSWORD
  $mapping:
    $body:
      old_password: old_password
      new_password: new_password
  $responseMapping:
    $returnValue: message
