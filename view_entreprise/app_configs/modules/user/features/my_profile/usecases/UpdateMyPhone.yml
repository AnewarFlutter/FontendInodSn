# --------------------------------------------------------------
# updateMyPhone - PATCH
# --------------------------------------------------------------
$name: updateMyPhone
$description: "Modifier son propre numéro de téléphone (via endpoint admin avec l'ID du user connecté). Synchronise avec Auth Service."
$skip: true
$async: true

$params:
  - $name: user_id
    $type: string
    $optional: false
    $description: "ID de l'utilisateur connecté (récupéré depuis le profil)"
  - $name: new_phone
    $type: string
    $optional: false

$returnDescription: "Confirmation de la mise à jour du téléphone"
$returnType:
  $type: string
  $nullable: true

$rewriteInController: true
$rewriteInDataSourceImpl: true
$implementationInDataSource:
  $type: api
  $client: fetch
  $endpoint: USER.UPDATE_MY_PHONE
  $mapping:
    $path:
      user_id: user_id
    $body:
      new_phone: new_phone
  $responseMapping:
    $returnValue: message
