# --------------------------------------------------------------
# createUser - POST
# --------------------------------------------------------------
$name: createUser
$description: "Crée un utilisateur via le Saga Pattern Auth+User. Permission: user.create"
$skip: true
$async: true

$params:
  - $name: payload
    $type: CreateUserPayload
    $related: "--module user --feature user_management --kind custom --step feature"
    $optional: false

$returnDescription: "Utilisateur créé avec son identifiant"
$returnType:
  $type: UserBasic
  $nullable: true
  $related:
    - $name: UserBasic
      $module: user
      $kind: custom
      $step: module

$rewriteInController: true
$rewriteInDataSourceImpl: true
$implementationInDataSource:
  $type: api
  $client: fetch
  $endpoint: USER.CREATE_USER
  $mapping:
    $body:
      email: payload.email
      phone: payload.phone
      first_name: payload.first_name
      last_name: payload.last_name
      gender: payload.gender
      roles: payload.roles
  $responseMapping:
    $returnValue: ""

$imports:
  - $name: CreateUserPayload
    $from: "--module user --feature user_management --kind custom --step feature"
    $step: feature
  - $name: UserBasic
    $from: "--module user --kind custom --step module"
    $step: module
