# --------------------------------------------------------------
# getUserDetail - GET
# --------------------------------------------------------------
$name: getUserDetail
$description: "Récupère les détails complets d'un utilisateur. Permission: user.view_all"
$skip: true
$async: true

$params:
  - $name: user_id
    $type: string
    $optional: false

$returnDescription: "Détails complets de l'utilisateur"
$returnType:
  $type: UserDetail
  $nullable: true
  $related:
    - $name: UserDetail
      $module: user
      $kind: custom
      $step: module

$rewriteInController: true
$rewriteInDataSourceImpl: true
$implementationInDataSource:
  $type: api
  $client: fetch
  $endpoint: USER.GET_USER_DETAIL
  $mapping:
    $path:
      user_id: user_id
  $responseMapping:
    $returnValue: ""

$imports:
  - $name: UserDetail
    $from: "--module user --kind custom --step module"
    $step: module
