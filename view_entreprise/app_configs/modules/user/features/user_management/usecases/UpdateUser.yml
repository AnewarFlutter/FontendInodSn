# --------------------------------------------------------------
# updateUser - PATCH
# --------------------------------------------------------------
$name: updateUser
$description: "Modifie les informations d'un utilisateur. Permission: user.update"
$skip: true
$async: true

$params:
  - $name: user_id
    $type: string
    $optional: false
  - $name: payload
    $type: UpdateUserPayload
    $related: "--module user --feature user_management --kind custom --step feature"
    $optional: false

$returnDescription: "Confirmation de la modification"
$returnType:
  $type: string
  $nullable: true

$rewriteInController: true
$rewriteInDataSourceImpl: true
$implementationInDataSource:
  $type: api
  $client: fetch
  $endpoint: USER.UPDATE_USER
  $mapping:
    $path:
      user_id: user_id
    $body:
      first_name: payload.first_name
      last_name: payload.last_name
      telephone: payload.telephone
  $responseMapping:
    $returnValue: message

$imports:
  - $name: UpdateUserPayload
    $from: "--module user --feature user_management --kind custom --step feature"
    $step: feature
