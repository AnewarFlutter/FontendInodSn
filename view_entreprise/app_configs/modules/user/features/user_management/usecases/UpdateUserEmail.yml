# --------------------------------------------------------------
# updateUserEmail - PATCH
# --------------------------------------------------------------
$name: updateUserEmail
$description: "Modifie l'email d'un utilisateur (synchronise avec Auth Service). Permission: user.update"
$skip: true
$async: true

$params:
  - $name: user_id
    $type: string
    $optional: false
  - $name: new_email
    $type: string
    $optional: false

$returnDescription: "Confirmation de la modification de l'email"
$returnType:
  $type: string
  $nullable: true

$rewriteInController: true
$rewriteInDataSourceImpl: true
$implementationInDataSource:
  $type: api
  $client: fetch
  $endpoint: USER.UPDATE_USER_EMAIL
  $mapping:
    $path:
      user_id: user_id
    $body:
      new_email: new_email
  $responseMapping:
    $returnValue: message
