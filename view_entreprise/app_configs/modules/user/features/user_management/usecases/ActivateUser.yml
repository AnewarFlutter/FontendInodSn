# --------------------------------------------------------------
# activateUser - POST
# --------------------------------------------------------------
$name: activateUser
$description: "Active un utilisateur suspendu. Permission: user.activate"
$skip: true
$async: true

$params:
  - $name: user_id
    $type: string
    $optional: false

$returnDescription: "Confirmation de l'activation"
$returnType:
  $type: string
  $nullable: true

$rewriteInController: true
$rewriteInDataSourceImpl: true
$implementationInDataSource:
  $type: api
  $client: fetch
  $endpoint: USER.ACTIVATE_USER
  $mapping:
    $path:
      user_id: user_id
  $responseMapping:
    $returnValue: message
