# ------------------------------------------------------------------
# GET_USER_STATS - Statistiques globales des utilisateurs (Admin)
# ------------------------------------------------------------------

$path: /user/stats/
$method: GET
$description: "Statistiques globales des utilisateurs. Permission: user.view_stats"
$auth: true
$skip: true
$response:
  $default:
    $schema:
      message: { $type: string }
      data:
        $type: object
        $schema:
          total_users: { $type: number }
          active_users: { $type: number }
          suspended_users: { $type: number }
          deactivated_users: { $type: number }
          pending_users: { $type: number }
          inactive_users: { $type: number }
          deleted_users: { $type: number }
          by_role:
            $type: object
            $keyType: { $type: string }
            $valueType: { $type: number }
            $description: "ex: { ADMIN: 2, LIVREUR: 3 }"
          by_gender:
            $type: object
            $keyType: { $type: string }
            $valueType: { $type: number }
            $description: "ex: { M: 4, F: 1 }"
  $byStatus:
    "403":
      $schema:
        error: { $type: string }
        code: { $type: string }
