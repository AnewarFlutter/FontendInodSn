# UPDATE_USER_PHONE
$path: /user/users/{user_id}/update-phone/
$method: PATCH
$description: "Modifier le telephone. Champ requis : new_phone. Permission: user.update"
$auth: true
$skip: true
$params:
  $path:
    user_id: { $type: string, $optional: false }
  $body:
    new_phone: { $type: string, $optional: false }
$response:
  $default:
    $schema:
      message: { $type: string }
  $byStatus:
    "400":
      $description: "Numéro de téléphone invalide ou déjà utilisé"
      $schema:
        error: { $type: string, $description: "ex: Le champ new_phone est requis" }
        code: { $type: string, $description: "ex: MISSING_FIELDS" }
    "404":
      $description: "Utilisateur non trouvé"
      $schema:
        error: { $type: string }
        code: { $type: string }
