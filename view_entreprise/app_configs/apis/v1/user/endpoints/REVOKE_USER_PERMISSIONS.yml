# ------------------------------------------------------------------
# REVOKE_USER_PERMISSIONS - Révocation de permissions individuelles (Admin)
# ------------------------------------------------------------------

$path: /user/users/{user_id}/permissions/revoke/
$method: POST
$description: "Révoquer des permissions individuelles à un utilisateur. Permission: permission.revoke — ATTENTION: méthode POST (non DELETE)"
$auth: true
$skip: true
$params:
  $path:
    user_id: { $type: string, $optional: false }
  $body:
    permissions: { $type: array, $items: { $type: string }, $optional: false, $description: "Codes de permissions à révoquer" }
$response:
  $default:
    $schema:
      message: { $type: string, $description: "ex: 1 permission(s) révoquée(s) avec succès" }
      data:
        $type: object
        $schema:
          user_id: { $type: string }
          email: { $type: string }
          revoked_permissions: { $type: array, $items: { $type: string }, $description: "Permissions révoquées" }
          not_found: { $type: array, $items: { $type: string }, $description: "Permissions non trouvées (ignorées)" }
          remaining_permissions: { $type: array, $items: { $type: string }, $description: "Permissions restantes" }
  $byStatus:
    "400":
      $description: "Permission invalide ou non accordée à cet utilisateur"
      $schema:
        error: { $type: string }
        code: { $type: string }
    "403":
      $description: "Permission insuffisante pour révoquer des permissions"
      $schema:
        detail: { $type: string }
    "404":
      $description: "Utilisateur non trouvé"
      $schema:
        error: { $type: string }
        code: { $type: string }
