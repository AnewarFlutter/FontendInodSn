# ------------------------------------------------------------------
# CHANGE_PASSWORD - Modifier son mot de passe
# ------------------------------------------------------------------

$path: /auth/change-password/
$method: POST
$description: "Modifier le mot de passe de l'utilisateur connecté. Requiert l'ancien mot de passe."
$auth: true
$skip: true
$params:
  $body:
    old_password: { $type: string, $optional: false }
    new_password: { $type: string, $optional: false }
$response:
  $default:
    $schema:
      message: { $type: string }
  $byStatus:
    "400":
      $description: "Ancien mot de passe incorrect ou nouveau mot de passe invalide"
      $schema:
        error: { $type: string }
        code: { $type: string, $optional: true }
    "401":
      $description: "Token manquant ou invalide"
      $schema:
        detail: { $type: string }
