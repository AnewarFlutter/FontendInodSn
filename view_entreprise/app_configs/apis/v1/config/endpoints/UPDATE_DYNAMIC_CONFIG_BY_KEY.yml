# ------------------------------------------------------------------
# UPDATE_DYNAMIC_CONFIG_BY_KEY - Modifier la valeur d'une config par clé
# ------------------------------------------------------------------
$path: /config/config/by-key/{config_key}/
$method: PUT
$description: "Modifier la valeur d'une configuration dynamique par sa clé"
$auth: true
$skip: false
$params:
  $path:
    config_key: { $type: string, $optional: false }
  $body:
    value: { $type: string, $optional: false }
$response:
  $default:
    $schema:
      id: { $type: number }
      key: { $type: string }
      value: { $type: string }
      data_type: { $type: string }
  $byStatus:
    "404":
      $schema:
        detail: { $type: string }
