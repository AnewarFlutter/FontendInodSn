# ------------------------------------------------------------------
# UPDATE_ITEM_TYPE - Mettre à jour complètement un type d'item
# ------------------------------------------------------------------
$path: /config/item-types/{item_type_id}/
$method: PUT
$description: "Mettre à jour complètement un type d'item"
$auth: true
$skip: false
$params:
  $path:
    item_type_id: { $type: number, $optional: false }
  $body:
    name: { $type: string, $optional: false }
    is_active: { $type: boolean, $optional: false }
$response:
  $default:
    $schema:
      id: { $type: number }
      name: { $type: string }
      is_active: { $type: boolean }
  $byStatus:
    "400":
      $schema:
        error: { $type: string }
    "404":
      $schema:
        detail: { $type: string }
