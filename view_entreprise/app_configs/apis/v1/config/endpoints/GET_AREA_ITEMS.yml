# ------------------------------------------------------------------
# GET_AREA_ITEMS - Items d'une zone
# ------------------------------------------------------------------
$path: /config/areas/{area_id}/items/
$method: GET
$description: "Récupérer les items d'une zone"
$auth: true
$skip: false
$params:
  $path:
    area_id: { $type: number, $optional: false }
  $query:
    is_active: { $type: boolean, $optional: true }
$response:
  $default:
    $schema:
      results:
        $type: array
        $items:
          $type: object
          $schema:
            id: { $type: number }
            name: { $type: string }
            price: { $type: number }
            is_active: { $type: boolean }
  $byStatus:
    "404":
      $schema:
        detail: { $type: string }
