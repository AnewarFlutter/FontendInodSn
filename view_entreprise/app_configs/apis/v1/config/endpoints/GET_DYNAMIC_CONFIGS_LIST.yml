# ------------------------------------------------------------------
# GET_DYNAMIC_CONFIGS_LIST - Liste des configurations dynamiques
# ------------------------------------------------------------------
$path: /config/config/
$method: GET
$description: "Lister toutes les configurations dynamiques"
$auth: true
$skip: false
$params:
  $query:
    data_type: { $type: string, $optional: true, $description: "Filtrer par type : boolean, string, integer, float, json" }
    search: { $type: string, $optional: true }
    ordering: { $type: string, $optional: true }
$response:
  $default:
    $schema:
      count: { $type: number }
      next: { $type: string, $nullable: true }
      previous: { $type: string, $nullable: true }
      results:
        $type: array
        $items:
          $type: object
          $schema:
            id: { $type: number }
            key: { $type: string }
            value: { $type: string }
            data_type: { $type: string }
            description: { $type: string, $optional: true, $nullable: true }
  $byStatus:
    "401":
      $schema:
        detail: { $type: string }
