# ------------------------------------------------------------------
# GET_ITEM_KITCHEN_AREAS - Zones cuisine d'un item
# ------------------------------------------------------------------
$path: /config/items/{item_id}/kitchen-areas/
$method: GET
$description: "Récupérer les zones cuisine associées à un item"
$auth: true
$skip: false
$params:
  $path:
    item_id: { $type: number, $optional: false }
  $query: {}
$response:
  $default:
    $schema:
      results:
        $type: array
        $items:
          $type: object
          $schema:
            id: { $type: number }
            name: { $type: string }
            is_active: { $type: boolean }
  $byStatus:
    "404":
      $schema:
        detail: { $type: string }
