# ------------------------------------------------------------------
# ADD_ITEM_CATEGORIES - Ajouter des catégories à un item
# ------------------------------------------------------------------
$path: /config/items/{item_id}/add-categories/
$method: POST
$description: "Ajouter des catégories à un item"
$auth: true
$skip: false
$params:
  $path:
    item_id: { $type: number, $optional: false }
  $body:
    category_ids: { $type: array, $items: { $type: number }, $optional: false }
$response:
  $default:
    $schema:
      message: { $type: string }
  $byStatus:
    "400":
      $schema:
        error: { $type: string }
    "404":
      $schema:
        detail: { $type: string }
