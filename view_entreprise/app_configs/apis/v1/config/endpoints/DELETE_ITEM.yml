# ------------------------------------------------------------------
# DELETE_ITEM - Supprimer un item
# ------------------------------------------------------------------
$path: /config/items/{item_id}/
$method: DELETE
$description: "Supprimer un item"
$auth: true
$skip: false
$params:
  $path:
    item_id: { $type: number, $optional: false }
$response:
  $default:
    $description: "204 No Content"
    $schema:
      message: { $type: string }
  $byStatus:
    "404":
      $schema:
        detail: { $type: string }
