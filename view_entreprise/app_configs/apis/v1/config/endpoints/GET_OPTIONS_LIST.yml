# ------------------------------------------------------------------
# GET_OPTIONS_LIST - Liste des options
# ------------------------------------------------------------------
$path: /config/options/
$method: GET
$description: "Lister toutes les options avec filtres"
$auth: true
$skip: false
$params:
  $query:
    parent_group: { $type: number, $optional: true }
    is_active: { $type: boolean, $optional: true }
    search: { $type: string, $optional: true }
    ordering: { $type: string, $optional: true }
$response:
  $default:
    $schema:
      count: { $type: number }
      next: { $type: string, $nullable: true }
      previous: { $type: string, $nullable: true }
      results:
        $type: array
        $items:
          $type: object
          $schema:
            id: { $type: number }
            name: { $type: string }
            parent_group: { $type: number }
            additional_amount: { $type: number }
            display_order: { $type: number, $nullable: true }
            is_active: { $type: boolean }
  $byStatus:
    "401":
      $schema:
        detail: { $type: string }
