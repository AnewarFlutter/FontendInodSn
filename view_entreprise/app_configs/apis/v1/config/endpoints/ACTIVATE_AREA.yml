# ------------------------------------------------------------------
# ACTIVATE_AREA - Activer une zone
# ------------------------------------------------------------------
$path: /config/areas/{area_id}/activate/
$method: POST
$description: "Activer une zone avec option de réactivation des items"
$auth: true
$skip: false
$params:
  $path:
    area_id: { $type: number, $optional: false }
  $body:
    reactivate_items: { $type: boolean, $optional: true }
$response:
  $default:
    $schema:
      message: { $type: string }
  $byStatus:
    "404":
      $schema:
        detail: { $type: string }
