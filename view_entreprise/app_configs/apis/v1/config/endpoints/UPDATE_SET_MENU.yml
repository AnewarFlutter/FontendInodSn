# ------------------------------------------------------------------
# UPDATE_SET_MENU - Modifier une formule (PUT)
# ------------------------------------------------------------------
$path: /config/set-menus/{set_menu_id}/
$method: PUT
$description: "Modifier complètement une formule"
$auth: true
$skip: false
$params:
  $path:
    set_menu_id: { $type: number, $optional: false }
  $body:
    name: { $type: string, $optional: false }
    description: { $type: string, $optional: true }
    price: { $type: number, $optional: false }
    display_order: { $type: number, $optional: false }
    is_active: { $type: boolean, $optional: false }
$response:
  $default:
    $schema:
      id: { $type: number }
      name: { $type: string }
      price: { $type: number }
      is_active: { $type: boolean }
  $byStatus:
    "400":
      $schema:
        error: { $type: string }
