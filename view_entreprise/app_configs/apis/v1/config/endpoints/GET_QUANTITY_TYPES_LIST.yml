# ------------------------------------------------------------------
# GET_QUANTITY_TYPES_LIST - Liste des types de quantité
# ------------------------------------------------------------------
$path: /config/quantity-types/
$method: GET
$description: "Lister tous les types de quantité"
$auth: true
$skip: false
$params:
  $query:
    search: { $type: string, $optional: true }
    is_active: { $type: boolean, $optional: true }
$response:
  $default:
    $schema:
      count: { $type: number }
      next: { $type: string, $nullable: true }
      previous: { $type: string, $nullable: true }
      results:
        $type: array
        $items:
          $type: object
          $schema:
            id: { $type: number }
            name: { $type: string }
            abbreviation: { $type: string }
            is_active: { $type: boolean }
  $byStatus:
    "401":
      $schema:
        detail: { $type: string }
