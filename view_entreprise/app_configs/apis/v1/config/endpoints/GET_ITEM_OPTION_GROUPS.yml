# ------------------------------------------------------------------
# GET_ITEM_OPTION_GROUPS - Groupes d'options d'un item
# ------------------------------------------------------------------
$path: /config/items/{item_id}/option-groups/
$method: GET
$description: "Récupérer les groupes d'options associés à un item"
$auth: true
$skip: false
$params:
  $path:
    item_id: { $type: number, $optional: false }
  $query: {}
$response:
  $default:
    $schema:
      results:
        $type: array
        $items:
          $type: object
          $schema:
            id: { $type: number }
            name: { $type: string }
            is_mandatory: { $type: boolean }
            selection_type: { $type: string, $description: "Type de sélection : SINGLE, MULTIPLE" }
            max_selections: { $type: number }
  $byStatus:
    "404":
      $schema:
        detail: { $type: string }
