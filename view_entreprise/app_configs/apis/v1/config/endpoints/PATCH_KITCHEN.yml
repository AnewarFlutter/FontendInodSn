# ------------------------------------------------------------------
# PATCH_KITCHEN - Mise à jour partielle d'une cuisine
# ------------------------------------------------------------------
$path: /config/kitchens/{kitchen_id}/
$method: PATCH
$description: "Mettre à jour partiellement une cuisine"
$auth: true
$skip: false
$params:
  $path:
    kitchen_id: { $type: string, $optional: false }
  $body:
    name: { $type: string, $optional: true }
    description: { $type: string, $optional: true }
    icon: { $type: string, $optional: true }
    area: { $type: string, $optional: true, $nullable: true }
    responsable_id: { $type: string, $optional: true, $nullable: true }
$response:
  $default:
    $schema:
      id: { $type: string }
      name: { $type: string }
      slug: { $type: string }
      description: { $type: string, $nullable: true }
      icon: { $type: string, $nullable: true }
      area: { $type: string, $nullable: true }
      area_name: { $type: string, $nullable: true }
      responsable_id: { $type: string, $nullable: true }
      is_active: { $type: boolean }
  $byStatus:
    "400":
      $schema:
        detail: { $type: string }
    "404":
      $schema:
        detail: { $type: string }
