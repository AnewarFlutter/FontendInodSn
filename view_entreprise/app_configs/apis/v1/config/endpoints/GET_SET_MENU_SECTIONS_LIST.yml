# ------------------------------------------------------------------
# GET_SET_MENU_SECTIONS_LIST - Liste des sections de formule
# ------------------------------------------------------------------
$path: /config/set-menu-sections/
$method: GET
$description: "Lister toutes les sections de formule"
$auth: true
$skip: false
$params:
  $query:
    set_menu: { $type: number, $optional: true }
    category: { $type: number, $optional: true }
$response:
  $default:
    $schema:
      count: { $type: number }
      next: { $type: string, $nullable: true }
      previous: { $type: string, $nullable: true }
      results:
        $type: array
        $items:
          $type: object
          $schema:
            id: { $type: number }
            set_menu: { $type: number }
            category_id: { $type: number }
            max_selections: { $type: number }
  $byStatus:
    "401":
      $schema:
        detail: { $type: string }
