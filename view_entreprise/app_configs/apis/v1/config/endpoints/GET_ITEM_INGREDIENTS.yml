# ------------------------------------------------------------------
# GET_ITEM_INGREDIENTS - Ingrédients d'un item
# ------------------------------------------------------------------
$path: /config/items/{item_id}/ingredients/
$method: GET
$description: "Récupérer les ingrédients associés à un item"
$auth: true
$skip: false
$params:
  $path:
    item_id: { $type: number, $optional: false }
  $query: {}
$response:
  $default:
    $schema:
      results:
        $type: array
        $items:
          $type: object
          $schema:
            id: { $type: number }
            name: { $type: string }
            quantity: { $type: number }
            quantity_type_id: { $type: number }
            is_optional: { $type: boolean }
  $byStatus:
    "404":
      $schema:
        detail: { $type: string }
