# ------------------------------------------------------------------
# UPDATE_QUANTITY_TYPE - Modifier un type de quantité (PUT)
# ------------------------------------------------------------------
$path: /config/quantity-types/{quantity_type_id}/
$method: PUT
$description: "Modifier complètement un type de quantité"
$auth: true
$skip: false
$params:
  $path:
    quantity_type_id: { $type: number, $optional: false }
  $body:
    name: { $type: string, $optional: false }
    abbreviation: { $type: string, $optional: false }
    is_active: { $type: boolean, $optional: false }
$response:
  $default:
    $schema:
      id: { $type: number }
      name: { $type: string }
      abbreviation: { $type: string }
      is_active: { $type: boolean }
  $byStatus:
    "400":
      $schema:
        error: { $type: string }
