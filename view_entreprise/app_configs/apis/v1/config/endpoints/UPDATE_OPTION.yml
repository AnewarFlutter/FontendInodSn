# ------------------------------------------------------------------
# UPDATE_OPTION - Modifier une option (PUT)
# ------------------------------------------------------------------
$path: /config/options/{option_id}/
$method: PUT
$description: "Modifier complètement une option"
$auth: true
$skip: false
$params:
  $path:
    option_id: { $type: number, $optional: false }
  $body:
    parent_group: { $type: number, $optional: false }
    name: { $type: string, $optional: false }
    additional_amount: { $type: number, $optional: false }
    display_order: { $type: number, $optional: false }
    is_active: { $type: boolean, $optional: false }
$response:
  $default:
    $schema:
      id: { $type: number }
      parent_group: { $type: number }
      name: { $type: string }
      additional_amount: { $type: number }
      display_order: { $type: number }
      is_active: { $type: boolean }
  $byStatus:
    "400":
      $schema:
        error: { $type: string }
