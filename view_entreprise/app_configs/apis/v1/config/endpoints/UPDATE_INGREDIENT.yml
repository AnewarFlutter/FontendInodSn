# ------------------------------------------------------------------
# UPDATE_INGREDIENT - Modifier un ingrédient (PUT)
# ------------------------------------------------------------------
$path: /config/ingredients/{ingredient_id}/
$method: PUT
$description: "Modifier complètement un ingrédient"
$auth: true
$skip: false
$params:
  $path:
    ingredient_id: { $type: number, $optional: false }
  $body:
    name: { $type: string, $optional: false }
    is_active: { $type: boolean, $optional: false }
$response:
  $default:
    $schema:
      id: { $type: number }
      name: { $type: string }
      is_active: { $type: boolean }
  $byStatus:
    "400":
      $schema:
        error: { $type: string }
