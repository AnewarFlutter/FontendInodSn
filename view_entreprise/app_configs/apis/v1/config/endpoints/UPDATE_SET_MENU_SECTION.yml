# ------------------------------------------------------------------
# UPDATE_SET_MENU_SECTION - Modifier une section de formule (PUT)
# ------------------------------------------------------------------
$path: /config/set-menu-sections/{set_menu_section_id}/
$method: PUT
$description: "Modifier complètement une section de formule"
$auth: true
$skip: false
$params:
  $path:
    set_menu_section_id: { $type: number, $optional: false }
  $body:
    set_menu: { $type: number, $optional: false }
    category_id: { $type: number, $optional: false }
    max_selections: { $type: number, $optional: false }
    item_ids:
      $type: array
      $optional: false
      $items:
        $type: number
$response:
  $default:
    $schema:
      id: { $type: number }
      set_menu: { $type: number }
      category_id: { $type: number }
      max_selections: { $type: number }
  $byStatus:
    "400":
      $schema:
        error: { $type: string }
