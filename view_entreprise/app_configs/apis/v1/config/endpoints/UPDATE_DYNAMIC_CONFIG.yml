# ------------------------------------------------------------------
# UPDATE_DYNAMIC_CONFIG - Modifier une configuration dynamique (PUT)
# ------------------------------------------------------------------
$path: /config/config/{config_id}/
$method: PUT
$description: "Modifier complètement une configuration dynamique"
$auth: true
$skip: false
$params:
  $path:
    config_id: { $type: number, $optional: false }
  $body:
    key: { $type: string, $optional: false }
    value: { $type: string, $optional: false }
    data_type: { $type: string, $optional: false }
    description: { $type: string, $optional: true }
$response:
  $default:
    $schema:
      id: { $type: number }
      key: { $type: string }
      value: { $type: string }
      data_type: { $type: string }
      description: { $type: string, $optional: true, $nullable: true }
  $byStatus:
    "400":
      $schema:
        error: { $type: string }
